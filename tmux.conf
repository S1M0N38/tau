# Enable Mouse Support
# Allows clicking to select panes, scrolling through buffer history, and
# dragging pane borders to resize them. Without this, mouse input is ignored
# and you must use all keyboard shortcuts for navigation.
set -g mouse on

# Start windows and panes at 1, not 0
# The default index 0 is awkward to reach on keyboard (far top-left key).
# Index 1 is directly below your left hand on home row (and same key on most
# layouts). renumber-windows keeps numbering contiguous when a middle
# window is closed (e.g. 1,2,4 → 1,2,3) instead of leaving gaps.
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Use vi keys in copy mode
# Switches the scrollback/selection buffer from emacs-style keys to vi-style.
# Essential if you use Neovim — the same hjkl, v/V/y muscle memory applies.
# v = visual select (character-wise), V = visual select (line-wise),
# y = yank (copy to system clipboard), Escape = cancel selection.
setw -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'V' send -X select-line
bind-key -T copy-mode-vi 'y' send -X copy-selection-and-cancel
bind-key -T copy-mode-vi Escape send -X cancel

# Reload config with prefix + r
# Apply changes to this file without restarting tmux or detaching sessions.
# The display-message confirms the reload succeeded (no silent failures).
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded!"

# Fix Escape Time Delay
# tmux waits after every keystroke to see if it's part of an escape sequence
# (like arrow keys which send ESC+[A). The default is 500ms which makes
# switching to Normal mode in Neovim feel painfully laggy. 10ms is low
# enough to feel instant while still letting real escape sequences work.
set -sg escape-time 10

# Focus Events
# Enables terminal focus-in/focus-out escape sequences to be forwarded to
# programs running inside tmux. Neovim uses these to detect when you switch
# back to the terminal, triggering things like CursorHold autocommands,
# git-gutter refresh, or autoread of files changed outside the editor.
set-option -g focus-events on

# Cursor Shape
# Propagates cursor shape changes from applications (Neovim) through tmux.
# Without this, your cursor would stay a block even in Neovim's insert mode.
# Ss sets the cursor shape on enter, Se resets it on exit.
set -ga terminal-overrides '*:Ss=\E[%p1%d q:Se=\E[ q'

# Extended keys (CSI-u encoding)
# Tells tmux to encode modified keys (Ctrl+H, Shift+Tab, etc.) using the
# modern CSI-u sequence format. Without this, many key combinations are
# indistinguishable (e.g. Tab and Ctrl-I both send the same byte).
# This is required for Neovim to correctly recognize complex key mappings.
set -s extended-keys always
set -g extended-keys-format csi-u

# Advertise extended key support to specific terminal emulators so they
# know it's safe to send CSI-u sequences into tmux.
set -as terminal-features 'xterm*:extkeys'
set -as terminal-features 'wezterm*:extkeys'

# Terminal settings
# tmux-256color: Sets TERM inside tmux to a 256-color variant. Required for
#               accurate color rendering in Neovim and other TUI apps.
# allow-passthrough: Lets programs inside tmux send special escape sequences
#                   (like true-color queries or kitty graphics protocol)
#                   directly to the outer terminal, bypassing tmux's parser.
set -g default-terminal "tmux-256color"
set -g allow-passthrough on

# Tokyo Night Moon — colorscheme (from folke/tokyonight.nvim extras)
# Applies the Tokyo Night Moon palette to tmux UI elements: status bar,
# pane borders, copy mode, and messages. Uses true-color hex codes so the
# theme matches WezTerm and Neovim exactly.
set -g mode-style "fg=#82aaff,bg=#3b4261"
set -g message-style "fg=#82aaff,bg=#3b4261"
set -g message-command-style "fg=#82aaff,bg=#3b4261"
set -g pane-border-style "fg=#3b4261"
set -g pane-active-border-style "fg=#82aaff"

# Status bar — minimal layout
# Left:  session name in a blue badge (matches Tokyo Night accent).
# Right: nothing — keep it clean.
# Center: window list with current window highlighted on a slightly lighter
#         background (#3b4261) with bold blue text.
# Uses powerline-style separators () for a seamless look.
set -g status "on"
set -g status-justify "left"
set -g status-style "fg=#82aaff,bg=#1e2030"
set -g status-left-length "100"
set -g status-right-length "100"
set -g status-left-style NONE
set -g status-right-style NONE
set -g status-left "#[fg=#1b1d2b,bg=#82aaff,bold] #S #[fg=#82aaff,bg=#1e2030]"
set -g status-right ""
setw -g window-status-activity-style "underscore,fg=#828bb8,bg=#1e2030"
setw -g window-status-separator ""
setw -g window-status-style "NONE,fg=#828bb8,bg=#1e2030"
setw -g window-status-format "#[fg=#1e2030,bg=#1e2030]#[default] #I #W #[fg=#1e2030,bg=#1e2030]"
setw -g window-status-current-format "#[fg=#1e2030,bg=#3b4261]#[fg=#82aaff,bg=#3b4261,bold] #I #W #[fg=#3b4261,bg=#1e2030]"

# More intuitive keys for splitting
# Replaces the default prefix+% (horizontal) and prefix+" (vertical) which
# are hard to remember and type. | and - visually represent the split:
#   | = vertical bar → horizontal split (side by side)
#   - = horizontal dash → vertical split (top and bottom)
# -c ensures the new pane opens in the same working directory as the
# current pane, instead of dropping you back to $HOME.
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Sessionizer — pick a repo in ~/Developer via fzf popup.
# Creates a new tmux session if one doesn't exist, switches to it otherwise.
# Shows a statusline message on session creation.
bind f display-popup -w 70% -h 50% -E "~/.local/bin/tau-sessionizer"

