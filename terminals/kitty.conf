# tau terminal settings for kitty
# Copy this into your kitty.conf (~/.config/kitty/kitty.conf)

# Required for tau
# kitty has the kitty keyboard protocol enabled by default — no configuration needed.
# pi's Shift+Enter, Ctrl+Enter, Alt+Enter work out of the box.
window_padding_width 0

# Recommended for tau
include theme-TokyoNightMoon.conf
tab_bar_style hidden
font_family      Maple Mono NF
font_size        13.0
hide_window_decorations titlebar-only
macos_option_as_alt yes

# ═══════════════════════════════════════════════════════════════════════
# Key bindings: kitty → tmux escape sequences
#
# Each binding sends a unique escape sequence that tmux maps to a
# user-key, which is then bound to an action. This is how prefix-less
# keybindings work through the kitty → tmux → pi chain.
#
# NOTE: kitty on macOS cannot use the Cmd (⌘) key for key bindings —
# the OS intercepts it. The bindings below use Ctrl+Shift as an
# alternative modifier. Adjust to your preference.
# ═══════════════════════════════════════════════════════════════════════

# ── Window navigation ──────────────────────────────────────────────
# Ctrl+Shift+H / Ctrl+Shift+L → tmux user-keys (User0 / User1) — cycle windows
map ctrl+shift+h send_text all \x1b[1;9P
map ctrl+shift+l send_text all \x1b[1;9Q
# Ctrl+Shift+1-9 → tmux user-keys (User10-18) — select window by number
map ctrl+shift+1 send_text all \x1b[23;9~
map ctrl+shift+2 send_text all \x1b[24;9~
map ctrl+shift+3 send_text all \x1b[25;9~
map ctrl+shift+4 send_text all \x1b[26;9~
map ctrl+shift+5 send_text all \x1b[28;9~
map ctrl+shift+6 send_text all \x1b[29;9~
map ctrl+shift+7 send_text all \x1b[31;9~
map ctrl+shift+8 send_text all \x1b[32;9~
map ctrl+shift+9 send_text all \x1b[33;9~

# ── Session navigation ─────────────────────────────────────────────
# Ctrl+Shift+Left / Ctrl+Shift+Right → tmux user-keys (User2 / User3) — cycle sessions
map ctrl+shift+left send_text all \x1b[1;9R
map ctrl+shift+right send_text all \x1b[1;9S

# ── Window/session reordering ───────────────────────────────────────
# Alt+Left / Alt+Right → tmux user-keys (User6 / User7) — reorder windows
map alt+left send_text all \x1b[18;9~
map alt+right send_text all \x1b[19;9~
# Alt+Shift+Left / Alt+Shift+Right → tmux user-keys (User8 / User9) — reorder sessions
map alt+shift+left send_text all \x1b[20;9~
map alt+shift+right send_text all \x1b[21;9~

# ── Actions ─────────────────────────────────────────────────────────
# Ctrl+Shift+T → tmux user-key (User4) — new window in current directory
map ctrl+shift+t send_text all \x1b[15;9~
# Ctrl+Shift+A → tmux user-key (User5) — spawn pi pane in grid layout
map ctrl+shift+a send_text all \x1b[17;9~
# Ctrl+Shift+G → tmux user-key (User28) — lazygit floating popup
map ctrl+shift+g send_text all \x1b[43;9~
# Ctrl+Shift+E → tmux user-key (User29) — editor floating popup (LazyVim)
map ctrl+shift+e send_text all \x1b[44;9~

# ── Pass-through ────────────────────────────────────────────────────
# Alt+Enter passthrough (for pi and other TUI tools)
map alt+enter send_text all \x1b[13;3u
