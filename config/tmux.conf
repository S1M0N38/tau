# Enable Mouse Support
# Allows clicking to select panes, scrolling through buffer history, and
# dragging pane borders to resize them. Without this, mouse input is ignored
# and you must use all keyboard shortcuts for navigation.
set -g mouse on

# Start windows and panes at 1, not 0
# The default index 0 is awkward to reach on keyboard (far top-left key).
# Index 1 is directly below your left hand on home row (and same key on most
# layouts). renumber-windows keeps numbering contiguous when a middle
# window is closed (e.g. 1,2,4 → 1,2,3) instead of leaving gaps.
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Use vi keys in copy mode
# Switches the scrollback/selection buffer from emacs-style keys to vi-style.
# Essential if you use Neovim — the same hjkl, v/V/y muscle memory applies.
# v = visual select (character-wise), V = visual select (line-wise),
# y = yank (copy to system clipboard), Escape = cancel selection.
setw -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'V' send -X select-line
bind-key -T copy-mode-vi 'y' send -X copy-selection-and-cancel
bind-key -T copy-mode-vi Escape send -X cancel

# Reload config with prefix + r
# Apply changes to this file without restarting tmux or detaching sessions.
# The display-message confirms the reload succeeded (no silent failures).
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded!"

# Fix Escape Time Delay
# tmux waits after every keystroke to see if it's part of an escape sequence
# (like arrow keys which send ESC+[A). The default is 500ms which makes
# switching to Normal mode in Neovim feel painfully laggy. 10ms is low
# enough to feel instant while still letting real escape sequences work.
set -sg escape-time 10

# Focus Events
# Enables terminal focus-in/focus-out escape sequences to be forwarded to
# programs running inside tmux. Neovim uses these to detect when you switch
# back to the terminal, triggering things like CursorHold autocommands,
# git-gutter refresh, or autoread of files changed outside the editor.
set-option -g focus-events on

# Cursor Shape
# Propagates cursor shape changes from applications (Neovim) through tmux.
# Without this, your cursor would stay a block even in Neovim's insert mode.
# Ss sets the cursor shape on enter, Se resets it on exit.
set -ga terminal-overrides '*:Ss=\E[%p1%d q:Se=\E[ q'

# Extended keys (CSI-u encoding)
# Tells tmux to encode modified keys (Ctrl+H, Shift+Tab, etc.) using the
# modern CSI-u sequence format. Without this, many key combinations are
# indistinguishable (e.g. Tab and Ctrl-I both send the same byte).
# This is required for Neovim to correctly recognize complex key mappings.
set -s extended-keys always
set -g extended-keys-format csi-u

# Advertise extended key support to specific terminal emulators so they
# know it's safe to send CSI-u sequences into tmux.
set -as terminal-features 'xterm*:extkeys'
set -as terminal-features 'wezterm*:extkeys'

# Terminal settings
# tmux-256color: Sets TERM inside tmux to a 256-color variant. Required for
#               accurate color rendering in Neovim and other TUI apps.
# allow-passthrough: Lets programs inside tmux send special escape sequences
#                   (like true-color queries or kitty graphics protocol)
#                   directly to the outer terminal, bypassing tmux's parser.
set -g default-terminal "tmux-256color"
set -g allow-passthrough on

# Tokyo Night Moon — colorscheme (from folke/tokyonight.nvim extras)
# Applies the Tokyo Night Moon palette to tmux UI elements: status bar,
# pane borders, copy mode, and messages. Uses true-color hex codes so the
# theme matches WezTerm and Neovim exactly.
set -g mode-style "fg=#82aaff,bg=#3b4261"
set -g message-style "fg=#82aaff,bg=#3b4261"
set -g message-command-style "fg=#82aaff,bg=#3b4261"
set -g pane-border-style "fg=#3b4261"
set -g pane-active-border-style "fg=#82aaff"

# Status bar — windows and session switcher
# Left:   tmux window list — window number and name (#I #W).
#         Current window highlighted on a blue badge.
# Right:  clickable list of project sessions (sessions with @type=project).
#         Shows position and @project as display name. Current session gets a blue badge.
# Active elements (current window, current session) use a shared style:
#   dark text (#1b1d2b) on blue background (#82aaff) with powerline transitions.
set -g status "on"
set -g status-interval 2
set -g status-justify "left"
set -g status-style "fg=#82aaff,bg=#1e2030"
set -g status-left-length "100"
set -g status-right-length "200"
set -g status-left-style NONE
set -g status-right-style NONE
set -g status-left ""
set -g status-right "#(~/.local/bin/tau-status-sessions '#{session_name}')"
setw -g window-status-activity-style "underscore,fg=#828bb8,bg=#1e2030"
setw -g window-status-separator ""
setw -g window-status-style "NONE,fg=#828bb8,bg=#1e2030"
setw -g window-status-format "#[fg=#1e2030,bg=#1e2030]#[default] #I #W #[fg=#1e2030,bg=#1e2030]"
setw -g window-status-current-format "#[fg=#1e2030,bg=#82aaff]#[fg=#1b1d2b,bg=#82aaff,bold] #I #W #[fg=#82aaff,bg=#1e2030]"

# Cmd+H / Cmd+L — cycle through tmux windows without prefix
# WezTerm intercepts Cmd+H and Cmd+L and sends custom escape sequences.
# tmux maps these to user-keys (User0 / User1) which we bind here with -n
# (no prefix). The sequences must be explicitly set — tmux 3.6+ ships with
# no default user-key assignments.
# Note: this repurposes Cmd+H which macOS normally uses for "Hide application".
set -s user-keys[0] "\033[1;9P"
set -s user-keys[1] "\033[1;9Q"
bind-key -n User0 previous-window
bind-key -n User1 next-window

# Cmd+Shift+H / Cmd+Shift+L — cycle through project sessions only
# Uses tau-cycle-session which only considers sessions with @type=project,
# skipping agent, scratch, and other session types.
set -s user-keys[2] "\033[1;9R"
set -s user-keys[3] "\033[1;9S"
bind-key -n User2 run-shell "~/.local/bin/tau-cycle-session prev"
bind-key -n User3 run-shell "~/.local/bin/tau-cycle-session next"

# Super+Left / Super+Right — reorder tmux windows without prefix
# Swaps the current window with the previous/next window. Focus follows the
# window (the current window moves to the new position). swap-window fails
# silently at boundaries (first/last window), giving us clamp behavior.
set -s user-keys[6] "\033[18;9~"
set -s user-keys[7] "\033[19;9~"
bind-key -n User6 swap-window -d -t -1
bind-key -n User7 swap-window -d -t +1

# Super+Shift+Left / Super+Shift+Right — reorder project sessions without prefix
# Swaps the current project session's sort position with the previous/next
# project session. Uses @sort-index to control display/cycle order in the
# status bar and tau-cycle-session. Clamps at boundaries.
set -s user-keys[8] "\033[20;9~"
set -s user-keys[9] "\033[21;9~"
bind-key -n User8 run-shell "~/.local/bin/tau-swap-session prev"
bind-key -n User9 run-shell "~/.local/bin/tau-swap-session next"

# Force immediate status line refresh when switching sessions.
# refresh-client -S bypasses tmux's per-second #(...) cache and forces
# re-evaluation of the status-right script.
set-hook -g client-session-changed 'refresh-client -S'

# Seamless Neovim ↔ tmux pane navigation (Navigator.nvim)
# Maps Ctrl+h/j/k/l to directional pane selection without prefix.
# When Neovim is focused, the key is passed through so Navigator.nvim can
# handle it — moving between Neovim splits, and only falling through to
# tmux select-pane when there's no split in that direction. When a non-
# Neovim pane (shell, pi TUI, etc.) is focused, tmux selects the pane
# directly.
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?)(diff)?$'"
bind-key -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind-key -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind-key -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind-key -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"

# More intuitive keys for splitting
# Replaces the default prefix+% (horizontal) and prefix+" (vertical) which
# are hard to remember and type. | and - visually represent the split:
#   | = vertical bar → horizontal split (side by side)
#   - = horizontal dash → vertical split (top and bottom)
# -c ensures the new pane opens in the same working directory as the
# current pane, instead of dropping you back to $HOME.
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Cmd+T — create a new window in the current session
# Uses the same user-key + WezTerm escape sequence pattern as Cmd+H/L above.
# -c inherits the current pane's working directory so you don't land in $HOME.
set -s user-keys[4] "\033[15;9~"
bind-key -n User4 new-window -c "#{pane_current_path}"

# Cmd+A — spawn a new pi pane in a grid layout
# WezTerm sends \033[17;9~ mapped to User5.
# The tau-spawn-pi script creates a new pane running pi and arranges
# all panes in a grid: side-by-side until panes would be < 80 cols,
# then spawning in new rows below.
set -s user-keys[5] "\033[17;9~"
bind-key -n User5 run-shell "~/.local/bin/tau-spawn-pi"

# Cmd+1-9 — select window by number without prefix
# WezTerm sends escape sequences \033[23;9~ through \033[33;9~ (skipping 27, 30
# which have no standard F-key mapping in xterm's VT key table). tmux maps these
# to User10-18.
# select-window -t :N selects the window with that index number.
set -s user-keys[10] "\033[23;9~"
set -s user-keys[11] "\033[24;9~"
set -s user-keys[12] "\033[25;9~"
set -s user-keys[13] "\033[26;9~"
set -s user-keys[14] "\033[28;9~"
set -s user-keys[15] "\033[29;9~"
set -s user-keys[16] "\033[31;9~"
set -s user-keys[17] "\033[32;9~"
set -s user-keys[18] "\033[33;9~"
bind-key -n User10 select-window -t :1
bind-key -n User11 select-window -t :2
bind-key -n User12 select-window -t :3
bind-key -n User13 select-window -t :4
bind-key -n User14 select-window -t :5
bind-key -n User15 select-window -t :6
bind-key -n User16 select-window -t :7
bind-key -n User17 select-window -t :8
bind-key -n User18 select-window -t :9

# Cmd+G — open lazygit in a floating popup
# WezTerm sends \033[43;9~ mapped to User28. Opens lazygit centered at 90%×90%
# in the current pane's working directory (so it picks up the right git repo).
# Close with q or Esc from inside lazygit.
set -s user-keys[28] "\033[43;9~"
bind-key -n User28 display-popup -w 90% -h 90% -d "#{pane_current_path}" -E "lazygit"

# Cmd+E — open editor in a floating popup
# WezTerm sends \033[44;9~ mapped to User29. Opens LazyVim (nvim with NVIM_APPNAME=lazyvim)
# in a 90%×90% popup in the current pane's working directory.
# Close with :q in nvim.
set -s user-keys[29] "\033[44;9~"
bind-key -n User29 display-popup -w 90% -h 90% -d "#{pane_current_path}" -E "env NVIM_APPNAME=lazyvim nvim"

# Sessionizer — pick a repo in ~/Developer via fzf popup.
# Creates a new tmux session if one doesn't exist, switches to it otherwise.
# Shows a statusline message on session creation.
bind f display-popup -w 70% -h 50% -E "~/.local/bin/tau-sessionizer"

