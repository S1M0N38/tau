# === General ===

# Mouse: click panes, scroll buffer, drag borders
set -g mouse on

# Index from 1 (not 0), renumber on close to avoid gaps
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Vi copy mode (v=select, V=line, y=yank, Esc=cancel)
setw -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'V' send -X select-line
bind-key -T copy-mode-vi 'y' send -X copy-selection-and-cancel
bind-key -T copy-mode-vi Escape send -X cancel

# Reload config
bind r source-file "$TAU_ROOT/config/tmux.conf" \; display-message "Tau config reloaded!"

# === Performance & Compatibility ===

# 10ms escape delay — prevents Neovim normal-mode lag
set -sg escape-time 10

# Forward focus events to Neovim (CursorHold, autoread, etc.)
set-option -g focus-events on

# Cursor shape passthrough (block/line/beam follows Neovim mode)
set -ga terminal-overrides '*:Ss=\E[%p1%d q:Se=\E[ q'

# CSI-u extended keys — required for pi's Shift+Enter, Ctrl+Enter
set -s extended-keys always
set -g extended-keys-format csi-u
set -as terminal-features 'xterm*:extkeys'
set -as terminal-features 'wezterm*:extkeys'

# 256-color + passthrough for true-color and kitty graphics
set -g default-terminal "tmux-256color"
set -g allow-passthrough on

# === Tokyo Night Moon Colorscheme ===

set -g mode-style "fg=#82aaff,bg=#3b4261"
set -g message-style "fg=#82aaff,bg=#3b4261"
set -g message-command-style "fg=#82aaff,bg=#3b4261"
set -g pane-border-style "fg=#3b4261"
set -g pane-active-border-style "fg=#82aaff"

# === Status Bar ===

# Left: windows, right: sessions (current highlighted blue)
set -g status "on"
set -g status-interval 2
set -g status-justify "left"
set -g status-style "fg=#82aaff,bg=#1e2030"
set -g status-left-length "100"
set -g status-right-length "200"
set -g status-left-style NONE
set -g status-right-style NONE
set -g status-left ""
set -g status-right "#($TAU_ROOT/scripts/tau-status-sessions '#{session_name}')"
setw -g window-status-activity-style "underscore,fg=#828bb8,bg=#1e2030"
setw -g window-status-separator ""
setw -g window-status-style "NONE,fg=#828bb8,bg=#1e2030"
setw -g window-status-format "#[fg=#1e2030,bg=#1e2030]#[default] #I #W #[fg=#1e2030,bg=#1e2030]"
setw -g window-status-current-format "#[fg=#1e2030,bg=#82aaff]#[fg=#1b1d2b,bg=#82aaff,bold] #I #W #[fg=#82aaff,bg=#1e2030]"

# === Key Bindings: Windows ===

# Cmd+H/L — cycle windows
set -s user-keys[0] "\033[1;9P"
set -s user-keys[1] "\033[1;9Q"
bind-key -n User0 previous-window
bind-key -n User1 next-window

# Cmd+1-9 — select window by number
set -s user-keys[10] "\033[23;9~"
set -s user-keys[11] "\033[24;9~"
set -s user-keys[12] "\033[25;9~"
set -s user-keys[13] "\033[26;9~"
set -s user-keys[14] "\033[28;9~"
set -s user-keys[15] "\033[29;9~"
set -s user-keys[16] "\033[31;9~"
set -s user-keys[17] "\033[32;9~"
set -s user-keys[18] "\033[33;9~"
bind-key -n User10 select-window -t :1
bind-key -n User11 select-window -t :2
bind-key -n User12 select-window -t :3
bind-key -n User13 select-window -t :4
bind-key -n User14 select-window -t :5
bind-key -n User15 select-window -t :6
bind-key -n User16 select-window -t :7
bind-key -n User17 select-window -t :8
bind-key -n User18 select-window -t :9

# Super+Left/Right — reorder windows (clamp at boundaries)
set -s user-keys[6] "\033[18;9~"
set -s user-keys[7] "\033[19;9~"
bind-key -n User6 swap-window -d -t -1
bind-key -n User7 swap-window -d -t +1

# Cmd+T — new window (inherits cwd)
set -s user-keys[4] "\033[15;9~"
bind-key -n User4 new-window -c "#{pane_current_path}"

# === Key Bindings: Sessions ===

# Cmd+Shift+H/L — cycle sessions in @sort-index order
set -s user-keys[2] "\033[1;9R"
set -s user-keys[3] "\033[1;9S"
bind-key -n User2 run-shell "$TAU_ROOT/scripts/tau-cycle-session prev"
bind-key -n User3 run-shell "$TAU_ROOT/scripts/tau-cycle-session next"

# Super+Shift+Left/Right — reorder sessions via @sort-index
set -s user-keys[8] "\033[20;9~"
set -s user-keys[9] "\033[21;9~"
bind-key -n User8 run-shell "$TAU_ROOT/scripts/tau-swap-session prev"
bind-key -n User9 run-shell "$TAU_ROOT/scripts/tau-swap-session next"

# Immediate status refresh on session switch
set-hook -g client-session-changed 'refresh-client -S'

# === Key Bindings: Panes ===

# Ctrl+h/j/k/l — Neovim-aware pane navigation (passes through to Navigator.nvim)
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?)(diff)?$'"
bind-key -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind-key -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind-key -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind-key -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"

# prefix + |/— — split horizontal/vertical (inherits cwd)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Cmd+A — spawn pi pane in grid layout
set -s user-keys[5] "\033[17;9~"
bind-key -n User5 run-shell "$TAU_ROOT/scripts/tau-spawn-pi"

# === Key Bindings: Popups ===

# Cmd+G — git popup (TAU_GIT_CMD)
set -s user-keys[28] "\033[43;9~"
bind-key -n User28 run-shell "$TAU_ROOT/scripts/tau-popup-git"

# Cmd+E — editor popup (TAU_EDITOR_CMD)
set -s user-keys[29] "\033[44;9~"
bind-key -n User29 run-shell "$TAU_ROOT/scripts/tau-popup-editor"

# prefix+f — sessionizer (fzf project picker)
bind f display-popup -w 70% -h 50% -E "$TAU_ROOT/scripts/tau-sessionizer"
